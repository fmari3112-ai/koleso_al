<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Колесо выбора</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-head">
    <h1 class="page-head__title">НАЙДИ ТОЧКУ РОСТА</h1>
    <p class="page-head__subtitle">
      Прокрути колесо и получи подсказку,<br />
      что можно улучшить в твоём проекте
    </p>
  </header>

  <div class="stage">
    <div class="pointer-wrap" aria-hidden="true">
      <div class="pointer"></div>
    </div>
    <div id="wheel" class="wheel" role="img" aria-label="Колесо из шести секторов">
      <div class="wheel-center-bulb" aria-hidden="true"></div>
      <div class="wheel-inner" id="labels"></div>
      <div class="wheel-rim-lights" aria-hidden="true">
        <span class="wheel-bulb"></span>
        <span class="wheel-bulb"></span>
        <span class="wheel-bulb"></span>
        <span class="wheel-bulb"></span>
        <span class="wheel-bulb"></span>
        <span class="wheel-bulb"></span>
      </div>
    </div>
  </div>

  <p class="spin-hint">Доступна 1 прокрутка</p>
  <button type="button" class="btn" id="spinBtn">Крутить</button>

  <div id="resultModal" class="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBackdrop" tabindex="-1"></div>
    <div
      class="modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalDesc modalHint"
    >
      <button type="button" class="modal__close" id="modalCloseX" aria-label="Закрыть">
        ×
      </button>
      <h2 id="modalTitle" class="modal__title"></h2>
      <p id="modalDesc" class="modal__text"></p>
      <p id="modalHint" class="modal__hint">Отправьте это слово в сообщения 👇</p>
      <div class="modal__actions">
        <button type="button" class="btn btn--secondary modal__btn" id="modalCopyBtn">
          Скопировать слово
        </button>
        <a
          href="https://vk.me/clubfmbot"
          target="_blank"
          rel="noopener noreferrer"
          class="btn modal__btn"
        >
          Получить ответ
        </a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var SECTORS = [
        "Нет клиентов",
        "Разбор",
        "Идея",
        "Сценарий",
        "Ошибки",
        "Гайд",
      ];

      var SECTOR_ANGLE = 360 / SECTORS.length;

      var SECTOR_DESCRIPTIONS = [
        "Покажу, где у вас теряются клиенты и что можно улучшить.",
        "Разберу вашу ситуацию и подскажу, с чего начать.",
        "Подберу идею решения под ваш проект или задачу.",
        "Покажу, как может выглядеть логика бота под вашу задачу.",
        "Подскажу, какие ошибки чаще всего мешают внедрению AI и ботов.",
        "Отправлю простой гайд по внедрению AI и ботов без сложностей.",
      ];

      var COPY_BTN_DEFAULT = "Скопировать слово";
      var COPY_BTN_DONE = "Скопировано";

      var wheel = document.getElementById("wheel");
      var labelsRoot = document.getElementById("labels");
      var spinBtn = document.getElementById("spinBtn");
      var resultModal = document.getElementById("resultModal");
      var modalBackdrop = document.getElementById("modalBackdrop");
      var modalCloseX = document.getElementById("modalCloseX");
      var modalCopyBtn = document.getElementById("modalCopyBtn");
      var modalTitle = document.getElementById("modalTitle");
      var modalDesc = document.getElementById("modalDesc");

      var currentRotation = 0;
      var spinning = false;
      var copyBtnResetTimer = null;

      function resetCopyButtonLabel() {
        if (copyBtnResetTimer) {
          clearTimeout(copyBtnResetTimer);
          copyBtnResetTimer = null;
        }
        modalCopyBtn.textContent = COPY_BTN_DEFAULT;
      }

      function closeModal() {
        resetCopyButtonLabel();
        resultModal.classList.remove("is-open");
        resultModal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        spinBtn.focus();
      }

      function openResultModal(idx) {
        resetCopyButtonLabel();
        modalTitle.textContent = SECTORS[idx];
        modalDesc.textContent = SECTOR_DESCRIPTIONS[idx];
        resultModal.classList.add("is-open");
        resultModal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        modalCopyBtn.focus();
      }

      function copySectorWord() {
        var text = modalTitle.textContent;
        function showCopied() {
          modalCopyBtn.textContent = COPY_BTN_DONE;
          if (copyBtnResetTimer) clearTimeout(copyBtnResetTimer);
          copyBtnResetTimer = setTimeout(function () {
            modalCopyBtn.textContent = COPY_BTN_DEFAULT;
            copyBtnResetTimer = null;
          }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(showCopied).catch(function () {
            fallbackCopy(text, showCopied);
          });
        } else {
          fallbackCopy(text, showCopied);
        }
      }

      function fallbackCopy(text, onOk) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          if (document.execCommand("copy")) onOk();
        } catch (e) {}
        document.body.removeChild(ta);
      }

      function buildLabels() {
        labelsRoot.innerHTML = "";
        var w = wheel.offsetWidth || wheel.clientWidth || 280;
        var radiusPx = Math.max(w * 0.5 - 4, 48);
        var R = radiusPx * 0.66;
        for (var i = 0; i < SECTORS.length; i++) {
          var angle = i * SECTOR_ANGLE + SECTOR_ANGLE / 2;
          var txt = document.createElement("span");
          txt.className = "sector-text";
          txt.textContent = SECTORS[i];
          txt.style.left = "50%";
          txt.style.top = "50%";
          txt.style.transformOrigin = "center center";
          /* Центр на биссектрисе на расстоянии R; наклон строки = наклон луча (без выпрямления к горизонтали) */
          txt.style.transform =
            "translate(-50%, -50%) rotate(" +
            (angle - 90) +
            "deg) translateX(" +
            R +
            "px)";
          labelsRoot.appendChild(txt);
        }
      }

      function sectorIndexFromRotation(deg) {
        var r = ((deg % 360) + 360) % 360;
        var underPointer = (360 - r) % 360;
        var idx = Math.floor(underPointer / SECTOR_ANGLE);
        if (idx >= SECTORS.length) idx = SECTORS.length - 1;
        return idx;
      }

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function spin() {
        if (spinning) return;
        spinning = true;
        spinBtn.disabled = true;
        closeModal();

        var targetIndex = Math.floor(Math.random() * SECTORS.length);
        var margin = 4;
        var sectorStart = targetIndex * SECTOR_ANGLE + margin;
        var sectorEnd = (targetIndex + 1) * SECTOR_ANGLE - margin;
        var underPointer = randomInRange(sectorStart, sectorEnd);

        var spins = 4 + Math.floor(Math.random() * 3);
        var curNorm = ((currentRotation % 360) + 360) % 360;
        var targetNorm = (((360 - underPointer) % 360) + 360) % 360;
        var deltaMod = (targetNorm - curNorm + 360) % 360;
        var delta = spins * 360 + deltaMod;

        var durationMs = 4000;

        var endRotation = currentRotation + delta;

        wheel.style.transitionDuration = durationMs + "ms";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            wheel.style.transform = "rotate(" + endRotation + "deg)";
          });
        });

        function onEnd(e) {
          if (e.propertyName !== "transform") return;
          wheel.removeEventListener("transitionend", onEnd);
          currentRotation = endRotation;
          spinning = false;
          spinBtn.disabled = false;

          var idx = sectorIndexFromRotation(currentRotation);
          openResultModal(idx);
        }

        wheel.addEventListener("transitionend", onEnd);
      }

      modalBackdrop.addEventListener("click", closeModal);
      modalCloseX.addEventListener("click", closeModal);
      modalCopyBtn.addEventListener("click", copySectorWord);

      buildLabels();
      spinBtn.addEventListener("click", spin);
    })();
  </script>
</body>
</html>
